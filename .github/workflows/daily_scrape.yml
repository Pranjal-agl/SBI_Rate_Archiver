name: Daily Forex Scrape
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Chrome (for Selenium)
        uses: browser-actions/setup-chrome@v1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Run ────────────────────────────────────────────────────────────────
      - name: Run scraper
        id: scrape
        run: |
          BANKS="${{ github.event.inputs.banks || 'sbi hdfc icici' }}"
          python main.py --banks $BANKS
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      # ── Artifacts ──────────────────────────────────────────────────────────
      - name: Upload daily Excel as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: forex-rates-${{ github.run_id }}
          path: |
            data/
            all_rates_history.csv
            archiver.log
          if-no-files-found: warn
          retention-days: 90

      # ── Commit ─────────────────────────────────────────────────────────────
      - name: Commit updated data files
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last run: $(date +'%Y-%m-%d %H:%M:%S UTC')" > last_run.txt
          git add data/ all_rates_history.csv archiver.log last_run.txt || true
          git diff --staged --quiet \
            && echo "No changes to commit" \
            || git commit -m "data: forex rates $(date +'%Y-%m-%d %H:%M IST')"
          git push

      # ── Failure gate ───────────────────────────────────────────────────────
      - name: Fail job if scraper returned exit code 1 (total failure)
        if: steps.scrape.outputs.exit_code == '1'
        run: |
          echo " Scraper returned exit code 1: no data was fetched from any bank."
          exit 1
